name: tests

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

jobs:
  jvm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      # The Quran datasets are license-gated out of git (see README) — fetch them so
      # the dataset-dependent suites actually run instead of skipping via assumeTrue.
      # The screenshot golden tests still skip in CI: samples/ is personal data and
      # never leaves the developer machine.
      - name: Fetch Quran datasets
        run: sh scripts/fetch-datasets.sh

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew --no-daemon assembleDebug
